name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Supabase anon key is public by design — safe to expose in client bundles.
          # Fallback to secrets if set, otherwise use the hardcoded public values.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://vcxvufcbwvqhaeyjaqso.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjeHZ1ZmNid3ZxaGFleWphcXNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDgwMjAsImV4cCI6MjA5MDU4NDAyMH0.dO1WUzOH5rx2j4mdV8oAb5WopU1VYB9F4x9XyU_xJNo' }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY || '' }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
